<!DOCTYPE html>
<!-- defina que o documento está usando html -->
<html lang="pt-br">
    <!-- tag raiz do documento. Lang define o idioma da pagina -->
<head>
    <!-- cabeçalho da pagina invisivel para o usuario -->
    <meta charset="UTF-8">
    <!-- define a codifição de caracteres( acentos funcionando corretamente) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- faz a pagina se adaptar a celulares e tablets -->
    <title>meu blog</title>
    <!-- titulo que aparece na aba do navegador -->
</head>
<body>
    <!-- corpo da pag, tudo q aparece para o usuario -->
    <header
         cabeçalho visivel na pagina -->
        <img src="istockphoto-1037480168-612x612.jpg" alt="elefante zika" srcset="" height="500" width="750">
        <!-- img exibe uma imagem -->
         <!-- src = caminha da imagem -->
          <!-- alt = texto de referência da imagem -->
           <!-- width = largura da imagem -->
            <!-- height altura da imagem -->
             <nav>
                <!-- area de navegação -->
                 <a href="#filme">filmes</a>
                 <a href="#desenho//">desenho</a>
                 <a href="http://youtube.com" target="_blank">youtube</a>
                 <!-- tag <a> cria um link -->
                    <!-- href = destinho do site (pagina)-->
                     <!-- target="_blank" abre em uma nova pagina -->
             </nav>
    </header>
    <main>
        <!-- conteudo principal da pagina -->
        <h1>maiores elefantes</h1>
        <!-- titulo principal da pagina -->
         <h1>top un</h1>
         <img src="images.webp" alt="elefante pica">
         <h1>descrição</h1>
         <p>
        esse elefante é muito foda
         </p>
    </main>
    <footer>
        <!-- rodapé da pagina informações gerais -->
        <label for="">rodovia raposo tavares km 316 a 318</label>
        <label for="">bairro das bananeiras</label>
        <p>
            <a href="https://www.instagram.com/etecpirajuoficial/" target="_blank"><b> @etecpirajuoficial</b></a>
        </p>
        <!-- a tag label é um rotulo -->
    </footer>
</body>
</html>
